buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.3")
    }
}

apply plugin: "com.facebook.react.rootproject"

// ⬅ NEW: react-native-geolocation-service's native module
// (com.agontuk.RNFusedLocation) was compiled against play-services-location
// 21.0.1's API shape. Without this pin, Firebase's google-services Gradle
// plugin (applied above) resolves a newer, binary-incompatible version of
// the same library, causing a runtime crash the moment getCurrentLocation()
// is called:
//   java.lang.IncompatibleClassChangeError: Found interface
//   com.google.android.gms.location.FusedLocationProviderClient, but class
//   was expected
allprojects {
    configurations.all {
        resolutionStrategy {
            force 'com.google.android.gms:play-services-location:21.0.1'
        }
    }
}
